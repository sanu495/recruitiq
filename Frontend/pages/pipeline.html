<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecruitIQ — Pipeline</title>
<!-- ── Favicon ─────────────────────────────────────────── -->
<link rel="icon" href="../favicon/favicon.ico">
<link rel="icon" type="image/x-icon"        href="../favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
<link rel="apple-touch-icon"                href="../favicon/apple-touch-icon.png">
<link rel="manifest"                        href="../favicon/site.webmanifest">
<meta name="theme-color"                    content="#8B5CF6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.kanban-board { display:flex; gap:14px; overflow-x:auto; padding-bottom:16px; min-height:500px; }
.kanban-col { min-width:240px; width:240px; flex-shrink:0; }
.kanban-header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:var(--radius-md) var(--radius-md) 0 0; margin-bottom:8px; }
.kanban-col-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
.kanban-count { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; }
.kanban-cards { display:flex; flex-direction:column; gap:8px; }
.k-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:12px; cursor:pointer; transition:all 0.2s; }
.k-card:hover { border-color:var(--border-active); transform:translateY(-1px); }
.k-card-name { font-size:13px; font-weight:600; margin-bottom:4px; }
.k-card-role { font-size:11px; color:var(--text-muted); margin-bottom:8px; }
.k-card-score { font-size:12px; font-weight:700; }
.stage-applied    { background:rgba(100,116,139,0.15); }
.stage-screening  { background:rgba(139,92,246,0.15); }
.stage-interview  { background:rgba(245,158,11,0.15); }
.stage-offer      { background:rgba(217,102,245,0.15); }
.stage-hired      { background:rgba(34,197,94,0.15); }
.stage-rejected   { background:rgba(239,68,68,0.15); }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">

      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <h2>Hiring Pipeline</h2>
          <p>Drag candidates through hiring stages</p>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <select class="form-control" id="job-select" onchange="loadPipeline()" style="width:260px;">
            <option value="">Select a job...</option>
          </select>
          <button class="btn btn-danger btn-sm" id="bulk-reject-btn" style="display:none;" onclick="bulkReject()">Bulk Reject Applied</button>
        </div>
      </div>

      <!-- SUMMARY CARDS -->
      <div id="summary-row" style="display:none;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px;">
        <div class="card" style="padding:12px;text-align:center;" id="sum-applied">
          <div style="font-size:20px;font-weight:800;color:#94a3b8;">0</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">Applied</div>
        </div>
        <div class="card" style="padding:12px;text-align:center;" id="sum-screening">
          <div style="font-size:20px;font-weight:800;color:var(--violet-light);">0</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">Screening</div>
        </div>
        <div class="card" style="padding:12px;text-align:center;" id="sum-interview">
          <div style="font-size:20px;font-weight:800;color:var(--warning);">0</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">Interview</div>
        </div>
        <div class="card" style="padding:12px;text-align:center;" id="sum-offer">
          <div style="font-size:20px;font-weight:800;color:#D966F5;">0</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">Offer</div>
        </div>
        <div class="card" style="padding:12px;text-align:center;" id="sum-hired">
          <div style="font-size:20px;font-weight:800;color:var(--success);">0</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">Hired</div>
        </div>
        <div class="card" style="padding:12px;text-align:center;" id="sum-rejected">
          <div style="font-size:20px;font-weight:800;color:var(--danger);">0</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">Rejected</div>
        </div>
      </div>

      <!-- KANBAN BOARD -->
      <div id="board-container">
        <div class="empty-state">
          <div class="empty-state-icon">🔄</div>
          <h3>Select a job to view pipeline</h3>
          <p>Choose a job from the dropdown above to see candidates in each stage</p>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- CANDIDATE DETAIL MODAL -->
<div class="modal-overlay hidden" id="detail-modal">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <h3 class="modal-title" id="detail-name">Candidate Details</h3>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
requireAuth(['recruiter','admin']);
buildSidebar('pipeline');
buildTopbar('Pipeline', 'Manage candidate stages');

const STAGES = [
  {key:'applied',   label:'Applied',   color:'#94a3b8', bg:'rgba(100,116,139,0.15)'},
  {key:'screening', label:'Screening', color:'#A78BFA', bg:'rgba(139,92,246,0.15)'},
  {key:'interview', label:'Interview', color:'#F59E0B', bg:'rgba(245,158,11,0.15)'},
  {key:'offer',     label:'Offer',     color:'#D966F5', bg:'rgba(217,102,245,0.15)'},
  {key:'hired',     label:'Hired',     color:'#22C55E', bg:'rgba(34,197,94,0.15)'},
  {key:'rejected',  label:'Rejected',  color:'#EF4444', bg:'rgba(239,68,68,0.15)'},
];

let allApps = [];
let currentJobId = null;

// Load jobs into select
(async () => {
  try {
    const jobs = await JobsAPI.myPosted();
    const sel = document.getElementById('job-select');
    jobs.forEach(j => {
      const opt = document.createElement('option');
      opt.value = j.id; opt.textContent = `${j.title} (${j.status})`;
      sel.appendChild(opt);
    });
    // Check URL param
    const urlJobId = new URLSearchParams(window.location.search).get('job_id');
    if (urlJobId) { sel.value = urlJobId; loadPipeline(); }
  } catch(err) { showToast(err.message, 'error'); }
})();

async function loadPipeline() {
  currentJobId = document.getElementById('job-select').value;
  if (!currentJobId) {
    document.getElementById('board-container').innerHTML = `
      <div class="empty-state"><div class="empty-state-icon">🔄</div>
      <h3>Select a job to view pipeline</h3></div>`;
    document.getElementById('summary-row').style.display='none';
    document.getElementById('bulk-reject-btn').style.display='none';
    return;
  }

  document.getElementById('board-container').innerHTML =
    `<div style="text-align:center;padding:60px;color:var(--text-muted);"><div class="spinner" style="margin:0 auto;width:32px;height:32px;border-width:3px;"></div></div>`;

  try {
    const [apps, summary] = await Promise.all([
      PipelineAPI.forJob(currentJobId),
      PipelineAPI.summary(currentJobId),
    ]);
    allApps = apps;

    // Summary row
    const sumRow = document.getElementById('summary-row');
    sumRow.style.display = 'grid';
    STAGES.forEach(s => {
      const el = document.getElementById(`sum-${s.key}`);
      if (el) el.querySelector('div').textContent = summary[s.key] || 0;
    });
    document.getElementById('bulk-reject-btn').style.display = 'flex';

    // Build kanban
    const board = document.createElement('div');
    board.className = 'kanban-board';

    STAGES.forEach(stage => {
      const stageApps = apps.filter(a => a.stage === stage.key);
      const col = document.createElement('div');
      col.className = 'kanban-col';
      col.innerHTML = `
        <div class="kanban-header" style="background:${stage.bg};">
          <span class="kanban-col-title" style="color:${stage.color};">${stage.label}</span>
          <span class="kanban-count" style="background:${stage.color}20;color:${stage.color};">${stageApps.length}</span>
        </div>
        <div class="kanban-cards">
          ${stageApps.length === 0
            ? `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px;border:1px dashed var(--border);border-radius:var(--radius-md);">No candidates</div>`
            : stageApps.map(a => kanbanCard(a, stage.color)).join('')}
        </div>`;
      board.appendChild(col);
    });

    document.getElementById('board-container').innerHTML = '';
    document.getElementById('board-container').appendChild(board);

  } catch(err) { showToast(err.message, 'error'); }
}

function kanbanCard(app, color) {
  const score = app.ai_score;
  const scoreColor = score != null ? getScoreColor(score) : 'var(--text-muted)';
  return `
    <div class="k-card" onclick="showDetail(${app.id})">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div class="user-avatar" style="width:28px;height:28px;font-size:10px;">C${app.candidate_id}</div>
        <div>
          <div class="k-card-name">Candidate #${app.candidate_id}</div>
          <div class="k-card-role">App #${app.id}</div>
        </div>
      </div>
      ${score != null
        ? `<div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:10px;color:var(--text-muted);">AI Score</div>
            <div class="k-card-score" style="color:${scoreColor};">${score}/100</div>
           </div>
           <div style="height:3px;background:var(--border);border-radius:2px;margin-top:4px;">
             <div style="height:3px;width:${score}%;background:${scoreColor};border-radius:2px;"></div>
           </div>`
        : `<div style="font-size:10px;color:var(--text-muted);">Not AI screened yet</div>`}
      <div style="margin-top:8px;font-size:10px;color:var(--text-muted);">${formatDate(app.applied_at)}</div>
    </div>`;
}

async function showDetail(appId) {
  const app = allApps.find(a => a.id === appId);
  if (!app) return;

  document.getElementById('detail-name').textContent = `Candidate #${app.candidate_id}`;
  const score = app.ai_score;
  const scoreColor = score != null ? getScoreColor(score) : 'var(--text-muted)';

  document.getElementById('detail-content').innerHTML = `
    <div style="display:grid;gap:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:12px;color:var(--text-muted);">Current Stage</div>
          <div style="margin-top:4px;">${stageBadge(app.stage)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px;color:var(--text-muted);">Applied On</div>
          <div style="font-size:13px;font-weight:600;">${formatDate(app.applied_at)}</div>
        </div>
      </div>

      ${score != null ? `
        <div class="card" style="padding:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <div style="font-size:13px;font-weight:600;">AI Resume Score</div>
            <div style="font-size:20px;font-weight:800;color:${scoreColor};">${score}/100</div>
          </div>
          <div style="height:6px;background:var(--border);border-radius:3px;margin-bottom:10px;">
            <div style="height:6px;width:${score}%;background:${scoreColor};border-radius:3px;"></div>
          </div>
          <div style="font-size:12px;font-weight:600;color:${scoreColor};margin-bottom:6px;">${getScoreLabel(score)}</div>
          ${app.ai_feedback ? `<div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">${app.ai_feedback}</div>` : ''}
        </div>` : `
        <div class="card" style="padding:14px;text-align:center;">
          <div style="color:var(--text-muted);font-size:13px;margin-bottom:10px;">Resume not AI screened yet</div>
          <button class="btn btn-outline btn-sm" onclick="screenApp(${app.id})">🤖 Run AI Screening</button>
        </div>`}

      ${app.cover_letter ? `
        <div class="card" style="padding:14px;">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px;">Cover Letter</div>
          <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">${app.cover_letter}</div>
        </div>` : ''}

      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:10px;">Move to Stage</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${STAGES.filter(s => s.key !== app.stage).map(s =>
            `<button class="btn btn-ghost btn-sm" onclick="moveStage(${app.id},'${s.key}')" style="border-color:${s.color}30;color:${s.color};">${s.label}</button>`
          ).join('')}
        </div>
      </div>

      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;">Add Note</div>
        <textarea class="form-control" id="note-input" rows="2" placeholder="Private recruiter note..."></textarea>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="addNote(${app.id})">Save Note</button>
      </div>
    </div>`;

  document.getElementById('detail-modal').classList.remove('hidden');
}

function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

async function moveStage(appId, stage) {
  try {
    await PipelineAPI.updateStage(appId, stage);
    showToast(`Candidate moved to ${stage}`, 'success');
    closeDetail();
    loadPipeline();
  } catch(err) { showToast(err.message, 'error'); }
}

async function screenApp(appId) {
  showToast('Running AI screening...', 'info');
  try {
    const result = await AppAPI.screen(appId);
    showToast(`AI Score: ${result.ai_score}/100 — ${result.recommendation}`, 'success');
    closeDetail();
    loadPipeline();
  } catch(err) { showToast(err.message, 'error'); }
}

async function addNote(appId) {
  const note = document.getElementById('note-input').value.trim();
  if (!note) return;
  try {
    await AppAPI.addNote(appId, note);
    showToast('Note saved', 'success');
    document.getElementById('note-input').value='';
  } catch(err) { showToast(err.message, 'error'); }
}

async function bulkReject() {
  if (!currentJobId) return;
  if (!confirm('Reject all "Applied" stage candidates for this job?')) return;
  try {
    const result = await PipelineAPI.bulkReject(currentJobId);
    showToast(result.message, 'success');
    loadPipeline();
  } catch(err) { showToast(err.message, 'error'); }
}
</script>
</body>
</html>
